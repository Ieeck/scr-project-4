{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Players</title>
    <style>
        body {
            font-family: Helvetica, sans-serif;
            font-size: 24px;
        }

        th, td {
          padding: 15px
        }

        .table {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button {
            font-family: Helvetica, sans-serif;
            font-size: 24px;
            border-radius: 10px
        }

        input, select, textarea {
            font-family: Helvetica, sans-serif;
            font-size: 24px;
            border-radius: 10px
        }
    </style>
</head>
<body>

<div class="table"><table>
    <tr>
        <th>Class</th>
        <th>Double Unit?</th>
        <th>Number</th>
        <th>Operator</th>
    </tr>

    {% for x in players %}
        <tr>
            <td>{{ x.train_class }}</td>
            <td>{{ x.double_unit }}</td>
            <td>{{ x.number }}</td>
            <td>{{ x.operator }}</td>
            <td>
                <form action="{% url 'delete_train' x. %}" method='POST'>
                    {% csrf_token %}
                    <button>delete!</button>
                </form>
            </td>
        </tr>
    {% endfor %}
</table></div>
</body>
</html>
