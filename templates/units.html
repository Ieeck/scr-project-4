{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Units</title>
    <style>
        body {
            font-family: Helvetica, sans-serif;
            font-size: 24px;
        }

        th, td {
          padding: 15px
        }

        .table {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .links {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 10px;
            margin: 10px
        }

        button {
            font-family: Helvetica, sans-serif;
            font-size: 24px;
            border-radius: 10px
        }

        input, select, textarea {
            font-family: Helvetica, sans-serif;
            font-size: 24px;
            border-radius: 10px
        }
    </style>
</head>
<body>

<div class="links">
    <a href="{% url 'players' %}">To Players</a>
</div>

<div class="links">
    <a href="{% url 'assignments' %}">To Assignments</a>
</div>

<div class="links">
    <a href="{% url 'create_unit' %}">Create Unit</a>
</div>

<div class="table"><table>
    <tr>
        <th>Class</th>
        <th>Number</th>
        <th>Double Unit?</th>
        <th>Operator</th>
    </tr>

    {% for x in units %}
        <tr>
            <td>{{ x.train_class.name }}</td>
            <td>{{ x.number }}</td>
            <td>{{ x.train_class.double_unit }}</td>
            <td>{{ x.operator.name }}</td>
            <td>
                <form action="{% url 'delete_unit' x.id %}" method='POST'>
                    {% csrf_token %}
                    <button>delete!</button>
                </form>
            </td>
        </tr>
    {% endfor %}
</table></div>
</body>
</html>
