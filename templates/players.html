{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Players</title>
    <style>
        body {
            font-family: Helvetica, sans-serif;
            font-size: 24px;
        }

        th, td {
          padding: 15px
        }

        .table {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .links {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 10px;
            margin: 10px
        }

        button {
            font-family: Helvetica, sans-serif;
            font-size: 24px;
            border-radius: 10px
        }

        input, select, textarea {
            font-family: Helvetica, sans-serif;
            font-size: 24px;
            border-radius: 10px
        }
    </style>
</head>
<body>

<div class="links">
    <a href="{% url 'units' %}">To Units</a>
</div>

<div class="links">
    <a href="{% url 'assignments' %}">To Assignments</a>
</div>

<div class="links">
    <a href="{% url 'create_player' %}">Create Player</a>
</div>

<div class="table"><table>
    <tr>
        <th>Username</th>
        <th>Role</th>
    </tr>

    {% for x in players %}
        <tr>
            <td>{{ x.username }}</td>
            <td>{{ x.current_role.name }}</td>
            <td>
                <form action="{% url 'delete_player' x.username %}" method='POST'>
                    {% csrf_token %}
                    <button>delete!</button>
                </form>
            </td>
        </tr>
    {% endfor %}
</table></div>
</body>
</html>
